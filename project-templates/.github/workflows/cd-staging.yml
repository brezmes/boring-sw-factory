name: CD — Staging

on:
  push:
    branches: [develop, 'release/**']

concurrency:
  group: cd-staging
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ECR_REGISTRY }}/${{ github.event.repository.name }}:staging-${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy
        run: echo "TODO — deploy $IMAGE to staging environment"

      - name: Smoke test
        run: echo "TODO — run smoke tests against staging"

      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"Staging deploy ${STATUS}: ${{ github.event.repository.name }} @ ${GITHUB_SHA::7}\"}" \
            || true
